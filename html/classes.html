<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EduLearn – Хичээлүүд</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/student.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    /* ── Page header ── */
    .cls-page-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 26px; flex-wrap: wrap; gap: 14px;
    }
    .cls-page-head-left h1 {
      font-size: 22px; font-weight: 800; color: #f1f5f9; letter-spacing: -.4px;
    }
    .cls-page-head-left p { font-size: 13px; color: rgba(255,255,255,.55); margin-top: 3px; }
    .cls-head-tag {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: #64748b;
      background: #eef4ff; border: 1px solid rgba(7,67,125,.14);
      padding: 6px 14px; border-radius: 99px;
      box-shadow: 0 1px 4px rgba(7,67,125,.06);
    }
    .cls-head-tag i { color: #3b82f6; }

    /* ── Summary KPI bar ── */
    .cls-summary {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 14px; margin-bottom: 26px;
    }
    .cls-kpi {
      background: #eef4ff; border: 1px solid rgba(7,67,125,.14); border-radius: 16px;
      padding: 16px 20px; display: flex; align-items: center; gap: 14px;
      box-shadow: 0 4px 20px rgba(7,67,125,.18), 0 1px 4px rgba(0,0,0,.10);
      position: relative; overflow: hidden;
      transition: transform .2s, box-shadow .2s;
    }
    .cls-kpi:hover { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(7,67,125,.28); }
    .cls-kpi::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
      background: var(--kc, #3b82f6);
      transform: scaleX(0); transform-origin: left; transition: transform .25s;
    }
    .cls-kpi:hover::after { transform: scaleX(1); }
    .cls-kpi-icon {
      width: 44px; height: 44px; border-radius: 13px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      background: color-mix(in srgb, var(--kc,#3b82f6) 12%, #fff);
      color: var(--kc, #3b82f6);
    }
    .cls-kpi-val { font-size: 24px; font-weight: 800; color: #0f172a; line-height: 1; }
    .cls-kpi-lbl { font-size: 11.5px; color: #64748b; font-weight: 500; margin-top: 2px; }

    /* ── Layout ── */
    .cls-layout { display: flex; gap: 22px; align-items: flex-start; }

    /* ── Class card grid ── */
    .cls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 18px; width: 100%; transition: width .28s;
    }
    .cls-grid.has-detail { width: 290px; flex-shrink: 0; grid-template-columns: 1fr; }

    /* ── Class card ── */
    .cls-card {
      background: #eef4ff; border: 2px solid rgba(7,67,125,.16);
      border-radius: 20px; overflow: hidden; cursor: pointer;
      box-shadow: 0 4px 20px rgba(7,67,125,.18), 0 1px 4px rgba(0,0,0,.10);
      transition: transform .18s, box-shadow .18s, border-color .18s;
    }
    .cls-card:hover { transform: translateY(-4px); box-shadow: 0 14px 40px rgba(7,67,125,.30); }
    .cls-card.selected { transform: translateY(-4px); }
    .cls-card-top { height: 0; background: var(--cc, #3b82f6); transition: height .2s; }
    .cls-card.selected .cls-card-top { height: 5px; }

    /* Subject icon header */
    .cls-card-icon-row {
      padding: 18px 18px 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .cls-card-icon-box {
      width: 50px; height: 50px; border-radius: 15px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
      background: color-mix(in srgb, var(--cc, #3b82f6) 14%, #fff);
      color: var(--cc, #3b82f6);
    }
    /* SVG ring on card */
    .cls-card-ring { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
    .cls-card-ring svg { transform: rotate(-90deg); }
    .cls-card-ring-val {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; color: #0f172a;
    }

    .cls-card-body { padding: 12px 18px 16px; }
    .cls-card-subject {
      font-size: .67rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--cc, #3b82f6); margin-bottom: 3px;
    }
    .cls-card-name    { font-size: 1rem; font-weight: 800; color: #0f172a; line-height: 1.3; margin-bottom: 5px; }
    .cls-card-teacher { font-size: .78rem; color: #64748b; margin-bottom: 12px; }
    .cls-card-teacher i { margin-right: 4px; color: var(--cc, #3b82f6); }

    /* Stats strip */
    .cls-card-strip {
      display: flex; justify-content: space-between;
      border: 1px solid #f1f5f9; border-radius: 10px;
      overflow: hidden; margin-bottom: 12px;
    }
    .cls-card-strip-item {
      flex: 1; text-align: center; padding: 8px 4px;
      border-right: 1px solid #f1f5f9;
    }
    .cls-card-strip-item:last-child { border-right: none; }
    .cls-card-strip-val { font-size: 14px; font-weight: 800; color: #0f172a; line-height: 1; }
    .cls-card-strip-lbl { font-size: 9px; color: #94a3b8; font-weight: 500; margin-top: 2px; }

    /* Stacked progress bar on card */
    .cls-card-stacked { display: flex; height: 5px; border-radius: 99px; overflow: hidden; background: #f1f5f9; gap: 2px; }
    .cls-card-s-done     { background: #10b981; border-radius: 99px 0 0 99px; }
    .cls-card-s-pending  { background: #f59e0b; }
    .cls-card-s-new      { background: var(--cc, #3b82f6); border-radius: 0 99px 99px 0; }

    /* ── Detail panel ── */
    .cls-detail {
      flex: 1; background: #eef4ff; border: 1px solid rgba(7,67,125,.14);
      border-radius: 22px; overflow: hidden;
      box-shadow: 0 8px 40px rgba(7,67,125,.24), 0 2px 12px rgba(0,0,0,.12);
      min-width: 0; display: none;
    }
    .cls-detail.visible { display: block; }

    /* Detail gradient banner */
    .cls-det-banner {
      padding: 24px 28px 0;
      background: linear-gradient(160deg, color-mix(in srgb, var(--dcolor,#3b82f6) 9%, #fff) 0%, #fff 65%);
      border-bottom: 1px solid #f1f5f9;
    }
    .cls-det-top { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 18px; }
    .cls-det-icon {
      width: 56px; height: 56px; border-radius: 16px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 22px;
      background: color-mix(in srgb, var(--dcolor,#3b82f6) 14%, #fff);
      color: var(--dcolor, #3b82f6);
      box-shadow: 0 4px 14px color-mix(in srgb, var(--dcolor,#3b82f6) 22%, transparent);
    }
    .cls-det-info { flex: 1; min-width: 0; }
    .cls-det-subject {
      font-size: .67rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--dcolor, #3b82f6); margin-bottom: 3px;
    }
    .cls-det-title { font-size: 1.15rem; font-weight: 800; color: #0f172a; line-height: 1.25; }
    .cls-det-teacher { font-size: .8rem; color: #64748b; margin-top: 3px; }
    .cls-det-close {
      margin-left: auto; background: #f1f5f9; border: none;
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      cursor: pointer; color: #64748b; font-size: .88rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .cls-det-close:hover { background: #e2e8f0; color: #0f172a; }

    /* Detail KPI pills row */
    .cls-det-kpis { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
    .cls-det-kpi {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 14px; border-radius: 99px;
      border: 1.5px solid color-mix(in srgb, var(--dcolor,#3b82f6) 20%, #e2e8f0);
      background: color-mix(in srgb, var(--dcolor,#3b82f6) 6%, #fff);
    }
    .cls-det-kpi-icon {
      width: 22px; height: 22px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; background: var(--dcolor,#3b82f6); color: #fff;
    }
    .cls-det-kpi-val { font-size: 14px; font-weight: 800; color: #0f172a; }
    .cls-det-kpi-lbl { font-size: 10.5px; color: #64748b; font-weight: 500; }

    /* Tab bar */
    .cls-tabs { display: flex; }
    .cls-tab {
      padding: 11px 20px; font-size: .82rem; font-weight: 600;
      color: #64748b; cursor: pointer; border: none; background: none;
      border-bottom: 3px solid transparent;
      transition: color .15s, border-color .15s; white-space: nowrap;
    }
    .cls-tab.active { color: var(--dcolor, #3b82f6); border-bottom-color: var(--dcolor, #3b82f6); }
    .cls-tab:hover:not(.active) { color: #0f172a; }
    .cls-tab i { margin-right: 6px; }

    .cls-tab-body  { padding: 22px 24px; min-height: 340px; }
    .cls-tab-panel { display: none; }
    .cls-tab-panel.active { display: block; }

    /* ── Lessons tab ── */
    /* Stacked breakdown bar */
    .cls-breakdown-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .cls-breakdown-title { font-size: .78rem; font-weight: 600; color: #64748b; }
    .cls-breakdown-pct   { font-size: .78rem; font-weight: 700; color: var(--dcolor, #3b82f6); }
    .cls-stacked-bar { display: flex; height: 9px; border-radius: 99px; overflow: hidden; background: #f1f5f9; gap: 2px; margin-bottom: 8px; }
    .cls-sb-done     { background: #10b981; transition: width .5s; }
    .cls-sb-pending  { background: #f59e0b; transition: width .5s; }
    .cls-sb-new      { background: #e2e8f0; transition: width .5s; }
    .cls-breakdown-legend {
      display: flex; gap: 14px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .cls-bd-item { display: flex; align-items: center; gap: 5px; font-size: .72rem; color: #64748b; }
    .cls-bd-dot  { width: 8px; height: 8px; border-radius: 50%; }

    /* Lesson timeline */
    .cls-lesson-tl { }
    .cls-lesson-tl-item { display: flex; gap: 14px; position: relative; }
    .cls-lesson-tl-item:not(:last-child)::before {
      content: ''; position: absolute;
      left: 18px; top: 38px; width: 2px;
      height: calc(100% - 14px);
      background: linear-gradient(to bottom, #e2e8f0 60%, transparent);
      z-index: 0;
    }
    .cls-tl-num {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; font-weight: 700; z-index: 1;
      background: color-mix(in srgb, var(--dcolor, #3b82f6) 12%, #fff);
      color: var(--dcolor, #3b82f6);
      border: 2px solid color-mix(in srgb, var(--dcolor, #3b82f6) 28%, #fff);
      transition: background .15s;
    }
    .cls-tl-num.done { background: #d1fae5; color: #065f46; border-color: #a7f3d0; }
    .cls-tl-num.pending {
      background: #fef3c7; color: #92400e; border-color: #fde68a;
      box-shadow: 0 0 0 3px rgba(245,158,11,.12);
    }
    .cls-tl-body { flex: 1; min-width: 0; padding-bottom: 16px; }
    .cls-tl-card {
      background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 12px;
      padding: 12px 14px; transition: border-color .15s, box-shadow .15s;
    }
    .cls-tl-card:hover { border-color: color-mix(in srgb, var(--dcolor,#3b82f6) 30%, #e2e8f0); box-shadow: 0 3px 12px rgba(7,67,125,.07); }
    .cls-tl-card.done   { background: #f0fdf4; border-color: #d1fae5; }
    .cls-tl-card.pending { background: #fffbeb; border-color: #fde68a; }
    .cls-tl-card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .cls-tl-title { font-size: .875rem; font-weight: 700; color: #0f172a; flex: 1; }
    .cls-tl-badge {
      font-size: .68rem; font-weight: 700; padding: 3px 10px; border-radius: 99px; white-space: nowrap;
    }
    .cls-tl-badge.done    { background: #d1fae5; color: #065f46; }
    .cls-tl-badge.pending { background: #fef3c7; color: #92400e; }
    .cls-tl-badge.new     { background: #dbeafe; color: #1d4ed8; }
    .cls-tl-meta { display: flex; align-items: center; gap: 14px; margin-top: 7px; flex-wrap: wrap; }
    .cls-tl-meta-item { display: flex; align-items: center; gap: 5px; font-size: .72rem; color: #94a3b8; }

    /* ── Materials tab ── */
    .cls-mat-stats { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
    .cls-mat-stat-pill {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 13px; border-radius: 99px; font-size: .75rem; font-weight: 600;
      background: #f8fafc; border: 1px solid #e2e8f0; color: #64748b;
    }
    .cls-mat-stat-pill i { font-size: .8rem; }
    .cls-mat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .cls-mat-card {
      background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 14px;
      padding: 14px 16px; cursor: pointer;
      transition: border-color .15s, box-shadow .15s, transform .15s;
      display: flex; flex-direction: column; gap: 10px;
    }
    .cls-mat-card:hover {
      border-color: var(--dcolor, #3b82f6);
      box-shadow: 0 6px 18px rgba(7,67,125,.09);
      transform: translateY(-2px);
    }
    .cls-mat-card-top { display: flex; align-items: flex-start; gap: 10px; }
    .cls-mat-icon-box {
      width: 40px; height: 40px; border-radius: 11px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 17px;
    }
    .cls-mat-icon-box.pdf  { background: #fee2e2; color: #b91c1c; }
    .cls-mat-icon-box.doc  { background: #dbeafe; color: #1d4ed8; }
    .cls-mat-icon-box.img  { background: #d1fae5; color: #065f46; }
    .cls-mat-icon-box.ppt  { background: #ffedd5; color: #c2410c; }
    .cls-mat-icon-box.file { background: #f1f5f9; color: #64748b; }
    .cls-mat-name { font-size: .82rem; font-weight: 700; color: #1e293b; line-height: 1.35; }
    .cls-mat-meta { font-size: .7rem; color: #94a3b8; margin-top: 2px; }
    .cls-mat-card-foot { display: flex; align-items: center; justify-content: space-between; }
    .cls-mat-date  { font-size: .7rem; color: #94a3b8; }
    .cls-mat-dl {
      width: 28px; height: 28px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: .78rem;
      background: color-mix(in srgb, var(--dcolor,#3b82f6) 11%, #fff);
      color: var(--dcolor, #3b82f6);
      border: 1px solid color-mix(in srgb, var(--dcolor,#3b82f6) 22%, #e2e8f0);
      transition: background .15s;
    }
    .cls-mat-dl:hover { background: var(--dcolor, #3b82f6); color: #fff; }

    /* ── Exams tab ── */
    .cls-exam-summary { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .cls-exam-sum-pill {
      flex: 1; min-width: 80px; text-align: center;
      padding: 10px 12px; border-radius: 13px;
      border: 1px solid #e2e8f0; background: #f8fafc;
    }
    .cls-exam-sum-val { font-size: 20px; font-weight: 800; color: #0f172a; line-height: 1; }
    .cls-exam-sum-lbl { font-size: 10px; color: #94a3b8; font-weight: 500; margin-top: 3px; }
    .cls-exam-card {
      border: 1.5px solid #e2e8f0; border-radius: 15px;
      overflow: hidden; margin-bottom: 12px;
      transition: box-shadow .15s;
    }
    .cls-exam-card:hover { box-shadow: 0 6px 20px rgba(7,67,125,.09); }
    .cls-exam-card-head {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      border-bottom: 1px solid #f8fafc;
      border-left: 5px solid var(--dcolor, #3b82f6);
    }
    .cls-exam-card-head.done-head   { border-left-color: var(--score-col, #10b981); }
    .cls-exam-card-head.upcoming-head { border-left-color: #94a3b8; }
    .cls-exam-name { font-size: .9rem; font-weight: 700; color: #0f172a; flex: 1; }
    .cls-exam-date-txt { font-size: .75rem; color: #94a3b8; margin-top: 2px; }
    .cls-exam-grade-badge {
      width: 42px; height: 42px; border-radius: 11px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 800;
    }
    .cls-exam-grade-badge.A { background: #d1fae5; color: #065f46; }
    .cls-exam-grade-badge.B { background: #dbeafe; color: #1d4ed8; }
    .cls-exam-grade-badge.C { background: #fef3c7; color: #92400e; }
    .cls-exam-grade-badge.D { background: #fee2e2; color: #b91c1c; }
    .cls-exam-grade-badge.up { background: #f1f5f9; color: #94a3b8; }

    /* Score body */
    .cls-exam-card-body { padding: 12px 16px; }
    .cls-exam-score-row {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
    }
    .cls-exam-score-num { font-size: 1.4rem; font-weight: 800; color: var(--score-col, #0f172a); }
    .cls-exam-score-of  { font-size: .78rem; color: #94a3b8; font-weight: 500; }
    .cls-exam-pct { font-size: .88rem; font-weight: 700; color: var(--score-col, #64748b); }
    /* Score bar */
    .cls-exam-bar-wrap { margin-bottom: 6px; }
    .cls-exam-bar-track { height: 8px; background: #f1f5f9; border-radius: 99px; overflow: visible; position: relative; }
    .cls-exam-bar-fill  { height: 100%; border-radius: 99px; background: var(--score-col, #10b981); transition: width .5s; position: relative; }
    /* Class avg marker */
    .cls-exam-avg-marker {
      position: absolute; top: -4px; height: 16px; width: 2px;
      background: #475569; border-radius: 2px;
      transform: translateX(-50%);
    }
    .cls-exam-avg-label {
      font-size: .68rem; color: #64748b; margin-top: 3px;
      display: flex; justify-content: space-between;
    }
    .cls-exam-upcoming-body {
      padding: 12px 16px; display: flex; align-items: center; gap: 12px;
    }
    .cls-exam-countdown {
      display: flex; align-items: center; gap: 6px;
      font-size: .78rem; font-weight: 600; color: #f59e0b;
      background: #fef3c7; padding: 5px 12px; border-radius: 99px;
    }

    /* Empty */
    .cls-empty { text-align: center; padding: 40px 20px; }
    .cls-empty i { font-size: 2.5rem; color: #cbd5e1; margin-bottom: 12px; display: block; }
    .cls-empty p { font-size: .85rem; color: #94a3b8; }

    @media (max-width: 1100px) {
      .cls-summary { grid-template-columns: repeat(2,1fr); }
    }
    @media (max-width: 768px) {
      .cls-layout { flex-direction: column; }
      .cls-grid.has-detail { width: 100%; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); }
      .cls-mat-grid { grid-template-columns: 1fr; }
      .cls-summary { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>
<body>

<div id="sidebar-container"></div>

<div class="page">

  <!-- Page header -->
  <div class="cls-page-head">
    <div class="cls-page-head-left">
      <h1>Хичээлүүд</h1>
      <p>Бүртгэлтэй хичээлүүд — хичээл, материал, шалгалт бүгд энд</p>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <div class="cls-head-tag"><i class="fas fa-layer-group"></i>4 хичээл</div>
      <div class="cls-head-tag"><i class="fas fa-calendar-week"></i>2026 оны 2-р улирал</div>
    </div>
  </div>

  <!-- Summary KPI cards -->
  <div class="cls-summary" id="clsSummary">
    <div class="cls-kpi" style="--kc:#3b82f6">
      <div class="cls-kpi-icon"><i class="fas fa-book-open"></i></div>
      <div><div class="cls-kpi-val" id="kpiLessons">0</div><div class="cls-kpi-lbl">Нийт хичээл</div></div>
    </div>
    <div class="cls-kpi" style="--kc:#10b981">
      <div class="cls-kpi-icon"><i class="fas fa-check-circle"></i></div>
      <div><div class="cls-kpi-val" id="kpiDone">0</div><div class="cls-kpi-lbl">Дуусгасан</div></div>
    </div>
    <div class="cls-kpi" style="--kc:#8b5cf6">
      <div class="cls-kpi-icon"><i class="fas fa-star"></i></div>
      <div><div class="cls-kpi-val" id="kpiAvg">0%</div><div class="cls-kpi-lbl">Дундаж оноо</div></div>

let selectedIdx = -1, activeTab = 'lessons';

/* ── helpers ── */
function hexToRgb(h) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
  return r ? `${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}` : null;
}
function scoreColor(s) {
  if (s >= 80) return '#10b981';
  if (s >= 65) return '#f59e0b';
  return '#ef4444';
}
function scoreLetter(pct) {
  if (pct >= 90) return 'A';
  if (pct >= 75) return 'B';
  if (pct >= 60) return 'C';
  return 'D';
}
function subjectIcon(subj) {
  return SUBJECT_ICONS[subj] || 'fa-book-open';
}

/* ── Summary KPI bar ── */
function buildSummary() {
  let totalLessons = 0, totalDone = 0, scoreSum = 0, scoreCount = 0, upcoming = 0;
  CLASSES.forEach(c => {
    totalLessons += c.lessons.length;
    totalDone    += c.lessons.filter(l => l.status === 'done').length;
    c.exams.forEach(e => {
      if (e.score !== null) { scoreSum += e.score / e.total * 100; scoreCount++; }
      else upcoming++;
    });
  });
  document.getElementById('kpiLessons').textContent  = totalLessons;
  document.getElementById('kpiDone').textContent     = totalDone;
  document.getElementById('kpiAvg').textContent      = scoreCount ? Math.round(scoreSum / scoreCount) + '%' : '—';
  document.getElementById('kpiUpcoming').textContent = upcoming;
}

/* ── Card SVG ring ── */
function ringHTML(pct, color, r) {
  const circ = 2 * Math.PI * r;
  const dash  = circ * pct / 100;
  return `<svg width="${r*2+10}" height="${r*2+10}" viewBox="0 0 ${r*2+10} ${r*2+10}">
    <circle cx="${r+5}" cy="${r+5}" r="${r}" fill="none" stroke="#e2e8f0" stroke-width="4"/>
    <circle cx="${r+5}" cy="${r+5}" r="${r}" fill="none" stroke="${color}" stroke-width="4"
      stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
  </svg>`;
}

/* ── Build class cards ── */
function buildCards() {
  document.getElementById('clsGrid').innerHTML = CLASSES.map((c,i) => {
    const done    = c.lessons.filter(l => l.status==='done').length;
    const pending = c.lessons.filter(l => l.status==='pending').length;
    const newL    = c.lessons.filter(l => l.status==='new').length;
    const total   = c.lessons.length;
    const pct     = Math.round(done/total*100);
    const donePct    = done/total*100;
    const pendPct    = pending/total*100;
    const newPct     = newL/total*100;
    const taken = c.exams.filter(e => e.score !== null).length;
    return `
    <div class="cls-card" id="clsCard${i}" style="--cc:${c.color}" onclick="selectClass(${i})">
      <div class="cls-card-top"></div>
      <div class="cls-card-icon-row">
        <div class="cls-card-icon-box"><i class="fas ${subjectIcon(c.subject)}"></i></div>
        <div class="cls-card-ring">
          ${ringHTML(pct, c.color, 21)}
          <div class="cls-card-ring-val">${pct}%</div>
        </div>
      </div>
      <div class="cls-card-body">
        <div class="cls-card-subject">${c.subject}</div>
        <div class="cls-card-name">${c.name}</div>

            <div class="cls-card-strip-lbl">Дуусгасан</div>
          </div>

            <div class="cls-card-strip-val">${c.materials.length}</div>

        <div class="cls-card-stacked">
          <div class="cls-card-s-done"    style="width:${donePct}%"></div>
          <div class="cls-card-s-pending" style="width:${pendPct}%"></div>
          <div class="cls-card-s-new"     style="width:${newPct}%"></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ── Select class ── */
function selectClass(idx) {
  selectedIdx = idx;
  const c = CLASSES[idx];

  document.querySelectorAll('.cls-card').forEach((el, i) => {
    el.classList.remove('selected');
    el.style.boxShadow = '';
    el.style.borderColor = '';
    if (i === idx) {
      el.classList.add('selected');
      el.style.borderColor = c.color;
      const rgb = hexToRgb(c.color);
      el.style.boxShadow = rgb
        ? `0 0 0 3px ${c.color}22, 0 12px 36px ${c.color}44`
        : `0 12px 36px rgba(7,67,125,.3)`;
    }
  });

  document.getElementById('clsGrid').classList.add('has-detail');
  const det = document.getElementById('clsDetail');
  det.classList.add('visible');
  det.style.setProperty('--dcolor', c.color);

  document.getElementById('detIcon').innerHTML = `<i class="fas ${subjectIcon(c.subject)}"></i>`;
  document.getElementById('detIcon').style.background = `color-mix(in srgb, ${c.color} 14%, #fff)`;
  document.getElementById('detIcon').style.color      = c.color;
  document.getElementById('detSubject').textContent   = c.subject;
  document.getElementById('detTitle').textContent     = c.name;
  document.getElementById('detTeacher').innerHTML     = `<i class="fas fa-chalkboard-teacher" style="margin-right:5px;opacity:.7"></i>${c.teacher}`;

  // KPI pills
  const done     = c.lessons.filter(l => l.status==='done').length;
  const total    = c.lessons.length;
  const scoresArr = c.exams.filter(e => e.score!==null);
  const avg      = scoresArr.length ? Math.round(scoresArr.reduce((s,e)=>s+e.score/e.total*100,0)/scoresArr.length) : null;
  const upcoming = c.exams.filter(e => e.score===null).length;

  document.getElementById('detKpis').innerHTML = `
    <div class="cls-det-kpi">
      <div class="cls-det-kpi-icon"><i class="fas fa-check"></i></div>
      <div class="cls-det-kpi-val">${done}/${total}</div>
      <div class="cls-det-kpi-lbl">Хичээл</div>
    </div>
    <div class="cls-det-kpi">
      <div class="cls-det-kpi-icon"><i class="fas fa-star"></i></div>
      <div class="cls-det-kpi-val">${avg !== null ? avg+'%' : '—'}</div>
      <div class="cls-det-kpi-lbl">Дундаж</div>
    </div>
    <div class="cls-det-kpi">
      <div class="cls-det-kpi-icon"><i class="fas fa-file-alt"></i></div>
      <div class="cls-det-kpi-val">${upcoming}</div>
      <div class="cls-det-kpi-lbl">Удахгүй</div>
    </div>
    <div class="cls-det-kpi">
      <div class="cls-det-kpi-icon"><i class="fas fa-folder"></i></div>
      <div class="cls-det-kpi-val">${c.materials.length}</div>
      <div class="cls-det-kpi-lbl">Материал</div>
    </div>`;

  switchTab(activeTab);
}

function closeDetail() {
  selectedIdx = -1;
  document.getElementById('clsGrid').classList.remove('has-detail');
  document.getElementById('clsDetail').classList.remove('visible');
  document.querySelectorAll('.cls-card').forEach(el => {
    el.classList.remove('selected');
    el.style.boxShadow = '';
    el.style.borderColor = '';
  });
}

function switchTab(tab, btn) {
  activeTab = tab;
  document.querySelectorAll('.cls-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.cls-tab-panel').forEach(p => p.classList.remove('active'));
  const target = btn || document.querySelector(`.cls-tab[data-tab="${tab}"]`);
  if (target) target.classList.add('active');
  const panelId = 'tab' + tab.charAt(0).toUpperCase() + tab.slice(1);
  const panel = document.getElementById(panelId);
  if (panel) panel.classList.add('active');
  if (selectedIdx >= 0) renderTab(tab);
}

/* ── Render tab content ── */
function renderTab(tab) {
  const c = CLASSES[selectedIdx];
  if      (tab === 'lessons')   renderLessonsPane(c);
  else if (tab === 'materials') renderMaterialsPane(c);
  else if (tab === 'exams')     renderExamsPane(c);
}

  const done    = c.lessons.filter(l => l.status==='done').length;
  const pending = c.lessons.filter(l => l.status==='pending').length;
  const newL    = c.lessons.filter(l => l.status==='new').length;

  const donePct = Math.round(done/total*100);

  document.getElementById('tabLessons').innerHTML = `
    <div class="cls-breakdown-header">
      <span class="cls-breakdown-title">Хичээлийн ахиц</span>
      <span class="cls-breakdown-pct">${done}/${total} дуусгасан</span>
    </div>
    <div class="cls-stacked-bar">
      <div class="cls-sb-done"    style="width:${done/total*100}%"></div>
      <div class="cls-sb-pending" style="width:${pending/total*100}%"></div>
      <div class="cls-sb-new"     style="width:${newL/total*100}%"></div>
    </div>
    <div class="cls-breakdown-legend">
      <div class="cls-bd-item"><div class="cls-bd-dot" style="background:#10b981"></div>Дуусгасан (${done})</div>
      <div class="cls-bd-item"><div class="cls-bd-dot" style="background:#f59e0b"></div>Явагдаж байна (${pending})</div>
      <div class="cls-bd-item"><div class="cls-bd-dot" style="background:#e2e8f0"></div>Удахгүй (${newL})</div>
    </div>
    <div class="cls-lesson-tl">
      ${c.lessons.map((l,i) => `
        <div class="cls-lesson-tl-item">
          <div class="cls-tl-num ${l.status==='done'?'done':l.status==='pending'?'pending':''}">
            ${l.status==='done' ? '<i class="fas fa-check" style="font-size:.7rem"></i>' : i+1}
          </div>
          <div class="cls-tl-body">
            <div class="cls-tl-card ${l.status==='done'?'done':l.status==='pending'?'pending':''}">
              <div class="cls-tl-card-top">
                <div class="cls-tl-title">${l.title}</div>
                <span class="cls-tl-badge ${l.status}">${l.status==='done'?'Дууссан':l.status==='pending'?'Явагдаж байна':'Удахгүй'}</span>

              </div>
            </div>
          </div>
        </div>`).join('')}
    </div>`;
}

function renderMaterialsPane(c) {
  const typeIcon = {pdf:'fa-file-pdf', doc:'fa-file-word', img:'fa-file-image', ppt:'fa-file-powerpoint'};

    </div>
    <div class="cls-mat-grid">
      ${c.materials.map(m => `
        <div class="cls-mat-card">

          </div>
        </div>`).join('')}
    </div>`;
}

function renderExamsPane(c) {
  const taken = c.exams.filter(e => e.score !== null);
  const avgPct = taken.length
    ? Math.round(taken.reduce((s,e) => s + e.score/e.total*100, 0) / taken.length)
    : null;
  const best = taken.length ? Math.max(...taken.map(e => Math.round(e.score/e.total*100))) : null;

  document.getElementById('tabExams').innerHTML = `
    <div class="cls-exam-summary">
      <div class="cls-exam-sum-pill">

      </div>
      <div class="cls-exam-sum-pill">
        <div class="cls-exam-sum-val" style="color:${best?scoreColor(best):'#94a3b8'}">${best !== null ? best+'%' : '—'}</div>
        <div class="cls-exam-sum-lbl">Хамгийн өндөр</div>
      </div>
    </div>
    ${c.exams.map(e => {
      const has  = e.score !== null;
      const pct  = has ? Math.round(e.score / e.total * 100) : null;
      const col  = has ? scoreColor(pct) : '#94a3b8';
      const ltr  = has ? scoreLetter(pct) : 'up';
      const headCls = !has ? 'upcoming-head' : 'done-head';
      if (has) {
        const avgMark = e.classAvgScore !== null ? Math.round(e.classAvgScore/e.total*100) : null;
        const compare = avgMark !== null
          ? (pct > avgMark ? `<span style="color:#10b981;font-size:.75rem;font-weight:700">▲ ангийн дунджаас +${pct-avgMark}%</span>`
            : pct < avgMark ? `<span style="color:#ef4444;font-size:.75rem;font-weight:700">▼ ангийн дунджаас -${avgMark-pct}%</span>`
            : `<span style="color:#64748b;font-size:.75rem">Ангийн дунджтай тэнцүү</span>`)
          : '';
        return `
          <div class="cls-exam-card">
            <div class="cls-exam-card-head done-head" style="--score-col:${col}">
              <div class="cls-exam-grade-badge ${ltr}">${ltr}</div>
              <div style="flex:1;min-width:0">
                <div class="cls-exam-name">${e.name}</div>
                <div class="cls-exam-date-txt"><i class="fas fa-calendar-alt" style="margin-right:4px;opacity:.6"></i>${e.date}</div>
              </div>
              <div style="text-align:right">
                <div class="cls-exam-score-num" style="--score-col:${col}">${e.score}</div>
                <div class="cls-exam-score-of">/ ${e.total} оноо</div>
              </div>
            </div>
            <div class="cls-exam-card-body">
              <div class="cls-exam-score-row">
                <div class="cls-exam-pct" style="--score-col:${col}">${pct}%</div>
                ${compare}
              </div>
              <div class="cls-exam-bar-wrap">
                <div class="cls-exam-bar-track">
                  <div class="cls-exam-bar-fill" style="width:${pct}%;background:${col}">
                  </div>
                  ${avgMark !== null ? `<div class="cls-exam-avg-marker" style="left:${avgMark}%"></div>` : ''}
                </div>
                <div class="cls-exam-avg-label">
                  <span>0%</span>
                  ${avgMark !== null ? `<span style="color:#475569">Ангийн дундаж: ${avgMark}%</span>` : ''}
                  <span>100%</span>
                </div>
              </div>
            </div>
          </div>`;
      } else {
        const today = new Date('2026-04-19');
        const exam  = new Date(e.date);
        const days  = Math.round((exam - today)/(1000*60*60*24));
        return `
          <div class="cls-exam-card">
            <div class="cls-exam-card-head upcoming-head">
              <div class="cls-exam-grade-badge up"><i class="fas fa-clock"></i></div>
              <div style="flex:1;min-width:0">
                <div class="cls-exam-name">${e.name}</div>
                <div class="cls-exam-date-txt"><i class="fas fa-calendar-alt" style="margin-right:4px;opacity:.6"></i>${e.date}</div>
              </div>
            </div>
            <div class="cls-exam-upcoming-body">
              <div class="cls-exam-countdown">
                <i class="fas fa-hourglass-half"></i>
                ${days > 0 ? days + ' хоногийн дараа' : days === 0 ? 'Өнөөдөр!' : 'Өнгөрсөн'}
              </div>
              <span style="font-size:.78rem;color:#64748b">Нийт: ${e.total} оноо</span>
            </div>
          </div>`;
      }
    }).join('')}`;
}

buildSummary();
buildCards();
</script>
</body>
</html>
