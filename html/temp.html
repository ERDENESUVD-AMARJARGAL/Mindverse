<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Course Player</title>
  <link rel="stylesheet" href="../css/temp.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
</head>
<body>

<header class="header">
  <div class="header-left">
    <a href="../html/classes.html" class="back-btn">
      <i class="bi bi-arrow-left"></i> Буцах
    </a>
    <span class="course-title" id="headerTitle">...</span>
  </div>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-label" id="progressLabel">0% дууссан</span>
  </div>
</header>

<div class="main">
  <div class="video-area">

    <div id="videoView">
      <div class="video-wrap">
        <video controls id="courseVideo"><source src="" type="video/mp4"></video>
      </div>
      <div class="lesson-meta">
        <span class="lesson-tag" id="lessonTag">Видео хичээл</span>
        <h1 class="lesson-title" id="lessonTitle">...</h1>
        <p class="lesson-desc" id="lessonDesc">...</p>
      </div>
    </div>

    <div id="exerciseView" style="display:none;">
      <div class="lesson-meta">
        <span class="lesson-tag" id="exTag">Дасгал ажил</span>
        <h1 class="lesson-title" id="exTitle">...</h1>
        <p class="lesson-desc" id="exDesc">...</p>
      </div>
      <div class="questions-wrap" id="questionsWrap"></div>
      <div class="exercise-footer">
        <button class="check-btn" id="checkBtn" onclick="checkAnswers()" disabled>Шалгах</button>
        <div class="score-wrap" id="scoreWrap" style="display:none;"></div>
      </div>
    </div>

    <div id="courseInfoStrip">
      <span><i class="bi bi-person-circle"></i> <span id="infoInstructor"></span></span>
      <span><i class="bi bi-journal-plus"></i> <span id="infoLessons"></span> хичээл</span>
      <span><i class="bi bi-alarm"></i> <span id="infoHours"></span> цаг</span>
      <span><i class="bi bi-people-fill"></i> <span id="infoEnrolled"></span> сурагч</span>
      <span><i class="bi bi-star-fill" style="color:#ffc107"></i> <span id="infoRating"></span></span>
      <span id="infoPrice"></span>
    </div>
  </div>

  <aside class="sidebar">
    <div class="sidebar-header"><h5>Хичээлийн жагсаалт</h5></div>
    <div class="sidebar-scroll">
      <div id="sidebarUnits"><div class="loading-state"><i class="bi bi-arrow-repeat"></i> Ачааллаж байна...</div></div>
      <div class="notes-section">
        <div class="notes-toggle" onclick="toggleNotes()">
          <div class="notes-toggle-left">
            <button class="add-note-btn" onclick="createNote(); event.stopPropagation();"><i class="bi bi-plus"></i></button>
            <span>Тэмдэглэл</span>
          </div>
          <i class="bi bi-chevron-down notes-chevron" id="notesChevron"></i>
        </div>
        <div class="notes-list" id="notesList"></div>
      </div>
    </div>
  </aside>
</div>

<script src="../js/temp.js"></script>
</body>
</html>
