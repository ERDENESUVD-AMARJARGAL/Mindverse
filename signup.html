<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - EduLearn</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <img src="./images/boy.png" alt="EduLearn Logo">
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <div class="login-box">
            <h2>Create Account</h2>
            <p class="subtitle">Join EduLearn as a teacher or student</p>

            <!-- Role Selector -->
            <span class="role-label">I am a:</span>
            <div class="role-selector">
                <button type="button" class="role-btn active" id="btn-student" onclick="selectRole('student')">
                    <i class="fa-solid fa-user-graduate"></i> Student
                </button>
                <button type="button" class="role-btn" id="btn-teacher" onclick="selectRole('teacher')">
                    <i class="fa-solid fa-chalkboard-user"></i> Teacher
                </button>
            </div>

            <form id="signup-form" action="#" method="POST">
                <input type="hidden" name="role" id="role-input" value="student">

                <div class="input-box">
                    <input type="text" name="fullname" placeholder="Full Name" required>
                </div>

                <div class="input-box">
                    <input type="email" name="email" placeholder="Email" required>
                </div>

                <div class="input-box">
                    <input type="password" name="password" placeholder="Password" required>
                </div>

                <div class="input-box">
                    <input type="password" name="confirm_password" placeholder="Confirm Password" required>
                </div>

                <div class="options">
                    <label>
                        <input type="checkbox" name="terms" required>
                        I agree to the Terms &amp; Conditions
                    </label>
                </div>

                <button type="submit" id="signup-btn">
                    <i class="fa-solid fa-user-plus"></i>
                    Sign Up as <span id="role-display">Student</span>
                </button>
            </form>

            <div class="signup">
                <p>Already have an account? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>
</div>

<script>
function selectRole(role) {
    document.getElementById('role-input').value = role;
    document.getElementById('role-display').textContent = role === 'student' ? 'Student' : 'Teacher';
    document.getElementById('btn-student').classList.toggle('active', role === 'student');
    document.getElementById('btn-teacher').classList.toggle('active', role === 'teacher');
}

document.getElementById('signup-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const fullname = this.fullname.value.trim();
    const email    = this.email.value.trim();
    const password = this.password.value;
    const confirm  = this.confirm_password.value;

    if (!fullname) { alert('Бүтэн нэрээ оруулна уу!'); return; }
    if (!email.includes('@')) { alert('Зөв имэйл хаяг оруулна уу!'); return; }
    if (password.length < 6) { alert('Нууц үг хамгийн багадаа 6 тэмдэгт байх ёстой!'); return; }
    if (password !== confirm) { alert('Нууц үг таарахгүй байна!'); return; }
    if (!this.terms.checked) { alert('Үйлчилгээний нөхцөлийг зөвшөөрнө үү!'); return; }

    sessionStorage.setItem('user_email', email);
    sessionStorage.setItem('user_name',  fullname);
    sessionStorage.setItem('user_role',  document.getElementById('role-input').value);

    window.location.href = 'main.html';
});
</script>

</body>
</html>
